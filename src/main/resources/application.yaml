spring:
  application:
    name: academic-integrity-review

  profiles:
    default: local

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
    max-age: ${APP_CORS_MAX_AGE:3600}
  security:
    jwt-secret: ${APP_JWT_SECRET:local-dev-jwt-secret-change-me-1234567890}
    jwt-expiration-hours: ${APP_JWT_EXPIRATION_HOURS:24}
  storage:
    uploads-dir: ${APP_UPLOADS_DIR:uploads}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  max-tokens: ${OPENAI_MAX_TOKENS:1500}
  temperature: ${OPENAI_TEMPERATURE:0.0}
  max-document-characters: ${OPENAI_MAX_DOCUMENT_CHARACTERS:25000}
